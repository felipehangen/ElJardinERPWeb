name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        env:
          VITE_APP_VERSION: ${{ github.sha }}
        run: npx vite build --base=/ElJardinERPWeb/

      # Write version.json so the running app can detect new deploys.
      # The app fetches /ElJardinERPWeb/version.json (cache: no-store) and
      # compares the SHA with its own embedded VITE_APP_VERSION.
      - name: Write version.json
        run: |
          printf '{"version":"%s","deployedAt":"%s"}\n' \
            "${{ github.sha }}" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > web/dist/version.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
